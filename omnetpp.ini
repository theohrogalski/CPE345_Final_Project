[General]
#scheduler-class = "inet::cRealTimeScheduler" #so that speed appears realistic
sim-time-limit = 1000s
user-interface = Qtenv

#abstract-config = true (requires omnet 7)

[Config Update]
#abstract-config = true (requires omnet 7)
**.updateInterval = 0.1s # test with 0s too, and let getCurrentPosition update the display string from a test module
**.mobility.initFromDisplayString = false

*.displayStringTextFormat = ""
*.updateInterval = 0.1s
*.faceForward = false
[PersistentMonitoring]
sim-time-limit = 1000s
cmdenv-autoflush = true
cmdenv-express-mode = false  # This shows every single event, not just summaries
network = PersistentMonitoringNetwork

**.networkConfiguratorModule = ""

*.visualizer.mobilityVisualizer.displayMobility = true # master switch
*.visualizer.mobilityVisualizer.displayPositions = true
*.visualizer.mobilityVisualizer.displayOrientations = true
*.visualizer.mobilityVisualizer.displayVelocities = true
*.visualizer.mobilityVisualizer.displayMovementTrails = true
**.num_agents = 3
